<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Russian Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e12;
    --surface: #16161e;
    --card: #1c1c28;
    --border: #2a2a3d;
    --accent: #e8b86d;
    --accent2: #7c9eff;
    --green: #6ee7b7;
    --red: #f87171;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }

  h1 {
    font-family: 'Inter', sans-serif;
    font-size: 2rem;
    color: var(--accent);
    letter-spacing: 0.02em;
    margin-bottom: 4px;
    text-align: center;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 28px;
    text-align: center;
  }

  /* ── Mode selector ── */
  .mode-bar {
    display: inline-flex;
    gap: 4px;
    margin-bottom: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 4px;
  }

  .mode-btn {
    padding: 10px 28px;
    border: none;
    border-radius: 50px;
    font-family: 'DM Mono', monospace;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .mode-btn.active {
    background: var(--accent);
    color: #0e0e12;
    font-weight: 500;
  }

  /* ── Class selector ── */
  #classSelector {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 20px;
    max-width: 520px;
  }

  .class-chip {
    padding: 8px 18px;
    border-radius: 50px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.88rem;
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.05em;
  }

  .class-chip.selected {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(124,158,255,0.1);
  }

  .chip-progress {
    font-size: 0.7rem;
    opacity: 0.7;
    margin-left: 4px;
  }
  .chip-progress.good { color: var(--green); opacity: 1; }
  .chip-progress.mid { color: var(--accent); opacity: 1; }

  /* ── Exercise type ── */
  .exercise-bar {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 28px;
    width: 100%;
    max-width: 420px;
  }

  .ex-btn {
    padding: 16px 24px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.04em;
    text-align: left;
    width: 100%;
  }

  .ex-btn.active {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(124,158,255,0.08);
  }

  .ex-btn:hover:not(.active) {
    border-color: var(--border);
    background: rgba(255,255,255,0.04);
    color: var(--text);
  }

  /* ── Card ── */
  .card-wrap {
    perspective: 1200px;
    width: 100%;
    max-width: 480px;
    height: 220px;
    margin-bottom: 20px;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px;
    gap: 10px;
  }

  .card-face.back { transform: rotateY(180deg); }

  .card-lang {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
  }

  .card-word {
    font-family: 'Inter', sans-serif;
    font-size: 2rem;
    text-align: center;
    color: var(--text);
    line-height: 1.2;
  }

  .card-face.back .card-word { color: var(--accent); }

  .card-hint {
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 4px;
  }

  .card-class-tag {
    position: absolute;
    top: 14px;
    right: 16px;
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  /* ── Multiple choice ── */
  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
    max-width: 480px;
    margin-bottom: 20px;
  }

  .choice-btn {
    padding: 14px 10px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.18s;
    text-align: center;
    line-height: 1.3;
  }

  .choice-btn:hover:not(:disabled) {
    border-color: var(--accent2);
    background: rgba(124,158,255,0.08);
  }

  .choice-btn.correct { border-color: var(--green); background: rgba(110,231,183,0.1); color: var(--green); }
  .choice-btn.wrong { border-color: var(--red); background: rgba(248,113,113,0.08); color: var(--red); }
  .choice-btn:disabled { cursor: default; }

  /* ── Type-in ── */
  .type-area {
    width: 100%;
    max-width: 480px;
    margin-bottom: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .type-input {
    width: 100%;
    padding: 14px 18px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .type-input:focus { border-color: var(--accent2); }
  .type-input.correct { border-color: var(--green); }
  .type-input.wrong { border-color: var(--red); }

  .submit-btn {
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: var(--accent2);
    color: #0e0e12;
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.18s;
  }

  .submit-btn:hover { opacity: 0.88; }

  /* ── Feedback ── */
  .feedback {
    font-size: 0.78rem;
    text-align: center;
    min-height: 20px;
    margin-bottom: 10px;
    letter-spacing: 0.04em;
  }

  .feedback.good { color: var(--green); }
  .feedback.bad { color: var(--red); }

  /* ── Nav buttons ── */
  .nav-row {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-top: 4px;
  }

  .nav-btn {
    padding: 13px 36px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.04em;
  }

  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }

  .progress-txt {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  /* ── Score bar ── */
  .score-bar {
    display: flex;
    gap: 16px;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-bottom: 20px;
  }

  .score-bar span { color: var(--text); }

  /* ── Empty state ── */
  .empty {
    color: var(--muted);
    font-size: 0.9rem;
    text-align: center;
    margin-top: 40px;
    letter-spacing: 0.05em;
  }

  /* ── Progress line ── */
  .prog-line {
    width: 100%;
    max-width: 480px;
    height: 3px;
    background: var(--border);
    border-radius: 3px;
    margin-bottom: 24px;
    overflow: hidden;
  }

  .prog-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  /* ── Word List Button ── */
  .wordlist-btn {
    margin-bottom: 20px;
    padding: 10px 24px;
    border-radius: 50px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.88rem;
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.05em;
  }
  .wordlist-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* ── Word List Screen (full-page overlay) ── */
  #wordlistScreen {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
    overflow-y: auto;
  }
  #wordlistScreen.open { display: flex; }

  .wls-header {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    max-width: 560px;
    margin-bottom: 24px;
  }
  .wls-title {
    font-family: 'Inter', sans-serif;
    font-size: 1.4rem;
    color: var(--accent);
    flex: 1;
  }

  .wls-filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    width: 100%;
    max-width: 560px;
    margin-bottom: 20px;
  }
  .wls-filter {
    padding: 6px 16px;
    border-radius: 50px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .wls-filter.active { border-color: var(--accent); color: var(--accent); background: rgba(232,184,109,0.08); }

  .wls-class-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    width: 100%;
    max-width: 560px;
    margin-bottom: 20px;
  }
  .wl-tab {
    padding: 6px 14px;
    border-radius: 50px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .wl-tab.active { border-color: var(--accent2); color: var(--accent2); background: rgba(124,158,255,0.08); }

  .wls-list {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .wl-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    transition: all 0.15s;
  }
  .wl-item.skipped { opacity: 0.4; }

  .wl-checkbox {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-size: 13px;
    color: var(--bg);
  }
  .wl-checkbox.checked { background: var(--muted); border-color: var(--muted); }
  .wl-checkbox.checked::after { content: '✓'; }

  .wl-word-info { flex: 1; min-width: 0; }
  .wl-ru { color: var(--text); font-size: 0.95rem; }
  .wl-en { color: var(--muted); font-size: 0.8rem; margin-top: 2px; }

  .wl-badges { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }
  .wl-badge {
    padding: 3px 8px;
    border-radius: 50px;
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .wl-badge.b3 { background: rgba(124,158,255,0.15); color: var(--accent2); border: 1px solid rgba(124,158,255,0.3); }
  .wl-badge.b5 { background: rgba(110,231,183,0.15); color: var(--green); border: 1px solid rgba(110,231,183,0.3); }
  .wl-badge.seen { background: rgba(107,107,128,0.15); color: var(--muted); border: 1px solid rgba(107,107,128,0.2); font-size: 0.68rem; }

  /* ── Focus mode (game active) ── */
  .setup-area { transition: all 0.2s; display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 420px; }
  body.game-active .setup-area { display: none !important; }
  body.game-active .wordlist-btn { display: none !important; }

  .game-header {
    display: none;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
    width: 100%;
    max-width: 480px;
  }
  body.game-active .game-header { display: flex; }

  .back-btn {
    padding: 8px 16px;
    border-radius: 50px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }

  .game-title-display {
    font-family: 'Inter', sans-serif;
    font-size: 1.1rem;
    color: var(--accent);
  }

  /* ── Nav/progress hidden until game starts ── */
  .game-area { display: none; width: 100%; max-width: 480px; align-items: center; flex-direction: column; }
  body.game-active .game-area { display: flex; }

  /* ── Match Game ── */
  .match-wrap {
    width: 100%;
    max-width: 520px;
    margin-bottom: 20px;
  }
  .match-cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .match-btn {
    padding: 12px 10px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.88rem;
    cursor: pointer;
    transition: all 0.18s;
    text-align: center;
    line-height: 1.3;
    word-break: break-word;
  }
  .match-btn:hover:not(:disabled) { border-color: var(--accent2); background: rgba(124,158,255,0.08); }
  .match-btn.selected { border-color: var(--accent); background: rgba(232,184,109,0.12); color: var(--accent); }
  .match-btn.matched { border-color: var(--green); background: rgba(110,231,183,0.1); color: var(--green); opacity: 0.6; cursor: default; }
  .match-btn.wrong-flash { border-color: var(--red); background: rgba(248,113,113,0.1); animation: wrongFlash 0.4s ease; }
  @keyframes wrongFlash { 0%,100%{} 50%{background:rgba(248,113,113,0.2);} }
  .match-score { text-align: center; font-size: 0.82rem; color: var(--muted); margin-bottom: 10px; letter-spacing: 0.06em; }
</style>
</head>
<body>

<h1>Русские слова</h1>
<p class="subtitle">Russian Vocabulary Trainer</p>

<!-- Word list toggle button -->
<button class="wordlist-btn" onclick="openWordList()">📖 Word List</button>

<!-- Word List Screen (full page) -->
<div id="wordlistScreen">
  <div class="wls-header">
    <button class="back-btn" onclick="closeWordList()">← Back</button>
    <span class="wls-title">Word List</span>
  </div>
  <div class="wls-filter-bar">
    <button class="wls-filter active" onclick="setWlFilter('all',this)">All</button>
    <button class="wls-filter" onclick="setWlFilter('learned3',this)">⭐ 3× streak</button>
    <button class="wls-filter" onclick="setWlFilter('learned5',this)">🌟 5× streak</button>
    <button class="wls-filter" onclick="setWlFilter('skipped',this)">☑ Skipped</button>
  </div>
  <div class="wls-class-tabs" id="wlTabs"></div>
  <div class="wls-list" id="wlList"></div>
</div>

<!-- Setup area (hidden during game) -->
<div class="setup-area">
  <!-- Mode -->
  <div class="mode-bar">
    <button class="mode-btn active" onclick="setMode('class')" id="btnClass">By Class</button>
    <button class="mode-btn" onclick="setMode('mixed')" id="btnMixed">Mixed</button>
  </div>

  <!-- Class selector (shown in "by class" mode) -->
  <div id="classSelector"></div>

  <!-- Exercise type -->
  <div class="exercise-bar">
    <button class="ex-btn active" onclick="setExercise('flashcard')" id="exFlash">🃏 Flashcard</button>
    <button class="ex-btn" onclick="setExercise('choice')" id="exChoice">☑ Multiple Choice</button>
    <button class="ex-btn" onclick="setExercise('typein')" id="exType">✏ Type In</button>
    <button class="ex-btn" onclick="setExercise('fill')" id="exFill">📝 Fill Blank</button>
    <button class="ex-btn" onclick="setExercise('match')" id="exMatch">🔗 Match</button>
  </div>
</div>

<!-- Game header (shown during game) -->
<div class="game-header">
  <button class="back-btn" onclick="exitGame()">← Back</button>
  <span class="game-title-display" id="gameTitleDisplay"></span>
</div>

<!-- Everything below only shown when a game is active -->
<div class="game-area" id="gameArea">

<!-- Progress line -->
<div class="prog-line" style="width:100%;max-width:480px;"><div class="prog-fill" id="progFill" style="width:0%"></div></div>

<!-- Card (flashcard mode) -->
<div class="card-wrap" id="cardWrap" style="display:none" onclick="flipCard()">
  <div class="card-inner" id="cardInner">
    <div class="card-face front">
      <div class="card-lang">Russian</div>
      <div class="card-word" id="cardFront">—</div>
      <div class="card-hint">tap to reveal</div>
      <div class="card-class-tag" id="cardClass"></div>
    </div>
    <div class="card-face back">
      <div class="card-lang">English</div>
      <div class="card-word" id="cardBack">—</div>
      <div class="card-class-tag" id="cardClassBack"></div>
    </div>
  </div>
</div>

<!-- Multiple choice -->
<div class="choices" id="choicesWrap" style="display:none"></div>

<!-- Type in -->
<div class="type-area" id="typeWrap" style="display:none">
  <div class="card-word" id="typeQuestion" style="font-family:'Inter',sans-serif;font-size:1.8rem;text-align:center;margin-bottom:8px;color:var(--text)"></div>
  <input class="type-input" id="typeInput" placeholder="Type the English meaning…" autocomplete="off" />
  <button class="submit-btn" onclick="checkType()">Check →</button>
</div>

<!-- Fill the blank -->
<div id="fillWrap" style="display:none;width:100%;max-width:480px;margin-bottom:16px;">
  <div id="fillSentence" style="font-family:'Inter',sans-serif;font-size:1.3rem;text-align:center;line-height:1.6;color:var(--text);margin-bottom:18px;min-height:60px;"></div>
  <div id="fillChips" style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:14px;"></div>
  <div id="fillReveal" style="display:none;background:rgba(232,184,109,0.08);border:1px solid rgba(232,184,109,0.3);border-radius:12px;padding:14px;text-align:center;margin-bottom:8px;">
    <div id="fillTranslation" style="color:var(--accent);font-size:0.95rem;line-height:1.5;"></div>
  </div>
</div>

<!-- Match game -->
<div id="matchWrap" style="display:none;width:100%;max-width:520px;">
  <div class="match-score" id="matchScore"></div>
  <div class="match-cols" id="matchCols"></div>
</div>

<!-- Feedback -->
<div class="feedback" id="feedback"></div>

<!-- Nav -->
<div class="nav-row">
  <button class="nav-btn" onclick="prevCard()">← Prev</button>
  <span class="progress-txt" id="progressTxt"></span>
  <button class="nav-btn" onclick="nextCard()">Next →</button>
</div>

<div class="empty" id="emptyMsg" style="display:none">Select at least one class to start!</div>

</div><!-- end game-area -->

<script>

// ── Progress (localStorage) ──────────────────────────
// progress[word.r] = { correct: N, skipped: bool }
// "streak" = total correct across ALL games
const STORAGE_KEY = 'ru_progress_v1';
let progress = {};

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    progress = raw ? JSON.parse(raw) : {};
  } catch(e) { progress = {}; }
}

function saveProgress() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); } catch(e) {}
}

function getP(word) {
  if (!progress[word]) progress[word] = { correct: 0, skipped: false };
  return progress[word];
}

function recordCorrect(wordR) {
  const p = getP(wordR);
  p.correct = (p.correct || 0) + 1;
  saveProgress();
}

function isSkipped(wordR) { return getP(wordR).skipped; }

function toggleSkip(wordR) {
  const p = getP(wordR);
  p.skipped = !p.skipped;
  saveProgress();
}

function getMilestone(wordR) {
  const c = getP(wordR).correct || 0;
  if (c >= 5) return 5;
  if (c >= 3) return 3;
  return 0;
}

function getClassProgress(classNum) {
  const words = ALL_WORDS.filter(w => w.c === classNum);
  if (!words.length) return { pct3: 0, pct5: 0, count3: 0, count5: 0, total: 0 };
  const c3 = words.filter(w => getMilestone(w.r) >= 3).length;
  const c5 = words.filter(w => getMilestone(w.r) >= 5).length;
  return { pct3: Math.round(c3/words.length*100), pct5: Math.round(c5/words.length*100),
           count3: c3, count5: c5, total: words.length };
}

// ── Fill the Blank ──────────────────────────────────
let fillQ = null;   // {word, sentIdx, sentence:{ru,en}}
let fillAnswered = false;

function getFillQuestion() {
  // pick a word that has sentences, from current deck
  const pool = deck.filter(w => SENTENCES[w.r]);
  if (!pool.length) return null;
  const w = pool[Math.floor(Math.random() * pool.length)];
  const sents = SENTENCES[w.r];
  const sent = sents[Math.floor(Math.random() * sents.length)];
  return { word: w, sentence: sent };
}

function renderFill() {
  if (deck.length === 0) return;
  fillQ = getFillQuestion();
  fillAnswered = false;
  const wrap = document.getElementById('fillWrap');
  const sentEl = document.getElementById('fillSentence');
  const chipsEl = document.getElementById('fillChips');
  const reveal = document.getElementById('fillReveal');
  reveal.style.display = 'none';
  document.getElementById('feedback').textContent = '';

  if (!fillQ) {
    sentEl.textContent = 'No sentences available for selected classes.';
    chipsEl.innerHTML = '';
    return;
  }

  const { word, sentence } = fillQ;
  const ru = sentence.ru;
  const escaped = word.r.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  const blanked = ru.replace(new RegExp(escaped, 'i'), '<span id="fillBlank" style="color:var(--accent2);font-weight:500">____</span>');
  sentEl.innerHTML = blanked;

  // Build 5 chips: 1 correct + 4 distractors
  const distractors = shuffle(ALL_WORDS.filter(w2 => w2.r !== word.r && w2.c === word.c || w2.r !== word.r)).slice(0, 4);
  const options = shuffle([word, ...distractors.slice(0,4)]);

  chipsEl.innerHTML = '';
  options.forEach(opt => {
    const chip = document.createElement('button');
    chip.className = 'choice-btn';
    chip.style.fontSize = '0.95rem';
    chip.style.padding = '10px 14px';
    chip.textContent = opt.r;
    chip.onclick = () => {
      if (fillAnswered) return;
      const correct = opt.r === word.r;
      if (correct) {
        fillAnswered = true;
        chip.classList.add('correct');
        chipsEl.querySelectorAll('button').forEach(b => b.disabled = true);
        recordCorrect(word.r);
        buildClassChips();
        // Show translation only after correct
        reveal.style.display = 'block';
        document.getElementById('fillTranslation').innerHTML =
          '<strong>' + word.r + '</strong> = ' + word.e + '<br><span style="color:var(--muted);font-size:0.85rem">' + sentence.en + '</span>';
        setFeedback('✓ Правильно!', true);
      } else {
        // Just turn red, don't reveal, don't lock
        chip.classList.add('wrong');
        chip.disabled = true;
        setTimeout(() => { chip.classList.remove('wrong'); chip.style.opacity='0.35'; }, 500);
      }
    };
    chipsEl.appendChild(chip);
  });
}

function renderWlTabs() {

  tabs.appendChild(allBtn);

  CLASSES.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'wl-tab' + (c === wlActiveClass ? ' active' : '');
    const prog = getClassProgress(c);
    btn.textContent = `Class ${c}`;
    if (prog.pct5 > 0) btn.textContent += ` 🌟${prog.pct5}%`;
    else if (prog.pct3 > 0) btn.textContent += ` ⭐${prog.pct3}%`;
    btn.onclick = () => { wlActiveClass = c; renderWlTabs(); renderWlList(); };
    tabs.appendChild(btn);
  });

function renderWlList() {
  const list = document.getElementById('wlList');
  list.innerHTML = '';
  let words = wlActiveClass === 'all' ? [...ALL_WORDS] : ALL_WORDS.filter(w => w.c === wlActiveClass);

  // Apply filter
  if (wlFilter === 'learned3') words = words.filter(w => getMilestone(w.r) >= 3);
  else if (wlFilter === 'learned5') words = words.filter(w => getMilestone(w.r) >= 5);
  else if (wlFilter === 'skipped') words = words.filter(w => isSkipped(w.r));

  if (words.length === 0) {
    const empty = document.createElement('div');
    empty.style.cssText = 'color:var(--muted);text-align:center;padding:32px;font-size:0.9rem;';
    empty.textContent = 'No words in this category yet.';
    list.appendChild(empty);
    return;
  }

  words.forEach(w => {
    const p = getP(w.r);
    const milestone = getMilestone(w.r);
    const skipped = isSkipped(w.r);

    const item = document.createElement('div');
    item.className = 'wl-item' + (skipped ? ' skipped' : '');

    // Checkbox
    const cb = document.createElement('div');
    cb.className = 'wl-checkbox' + (skipped ? ' checked' : '');
    cb.title = skipped ? 'Uncheck to include in training' : 'Check to skip in training';
    cb.onclick = () => {
      toggleSkip(w.r);
      // Re-render to reflect change
      renderWlList();
      buildClassChips(); // update chip progress
    };

    // Word info
    const info = document.createElement('div');
    info.className = 'wl-word-info';
    info.innerHTML = `<div class="wl-ru">${w.r}</div><div class="wl-en">${w.e}</div>`;

    // Badges
    const badges = document.createElement('div');
    badges.className = 'wl-badges';
    if (milestone >= 5) {
      const b = document.createElement('span');
      b.className = 'wl-badge b5';
      b.textContent = '🌟 5×';
      badges.appendChild(b);
    } else if (milestone >= 3) {
      const b = document.createElement('span');
      b.className = 'wl-badge b3';
      b.textContent = '⭐ 3×';
      badges.appendChild(b);
    } else if ((p.correct || 0) > 0) {
      const b = document.createElement('span');
      b.className = 'wl-badge seen';
      b.textContent = `${p.correct}×`;
      badges.appendChild(b);
    }

    item.appendChild(cb);
    item.appendChild(info);
    item.appendChild(badges);
    list.appendChild(item);
  });
}

// ── Init ──
function buildClassChips() {
  const el = document.getElementById('classSelector');
  el.innerHTML = '';
  CLASSES.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'class-chip' + (selectedClasses.has(c) ? ' selected' : '');
    btn.textContent = `Class ${c}`;
    btn.onclick = () => toggleClass(c, btn);
    el.appendChild(btn);
  });
}

function toggleClass(c, btn) {
  if (selectedClasses.has(c)) {
    if (selectedClasses.size === 1) return;
    selectedClasses.delete(c);
    btn.classList.remove('selected');
  } else {
    selectedClasses.add(c);
    btn.classList.add('selected');
  }
  buildDeck();
}

  flashcard: '🃏 Flashcard',
  choice: '☑ Multiple Choice',

  });

  document.getElementById('progFill').style.width = '0%';
  document.getElementById('progressTxt').textContent = '';
  document.getElementById('emptyMsg').style.display = 'none';

function buildDeck() {
  let pool;
  if (mode === 'mixed') {
    pool = [...ALL_WORDS];
  } else {
    pool = ALL_WORDS.filter(w => selectedClasses.has(w.c));
  }
  // Filter out skipped words
  pool = pool.filter(w => !isSkipped(w.r));

  // Smart sort: unseen first, then least correct, then shuffle ties
  // Within same class, newer class = higher priority
  pool.sort((a, b) => {
    const ca = getP(a.r).correct || 0;
    const cb = getP(b.r).correct || 0;
    if (ca !== cb) return ca - cb; // fewer correct = earlier
    return b.c - a.c; // newer class first within same correct count
  });

  // Shuffle words with same correct count so it's not always the same order
  // Group by correct count and shuffle within each group
  const groups = {};
  pool.forEach(w => {
    const k = getP(w.r).correct || 0;
    (groups[k] = groups[k] || []).push(w);
  });
  deck = [];
  Object.keys(groups).sort((a,b) => a-b).forEach(k => {
    deck.push(...shuffle(groups[k]));
  });

  idx = 0;
  matchOffset = 0;
  if (exercise === 'match') { renderMatch(); return; }
  renderCurrent();
}

function renderCurrent() {
  const empty = document.getElementById('emptyMsg');
  const cardWrap = document.getElementById('cardWrap');
  const choicesWrap = document.getElementById('choicesWrap');
  const typeWrap = document.getElementById('typeWrap');

  const matchWrap = document.getElementById('matchWrap');

    empty.style.display = 'block';
    cardWrap.style.display = 'none';

    typeWrap.style.display = 'none';
    document.getElementById('progressTxt').textContent = '0 / 0';
    document.getElementById('progFill').style.width = '0%';
    return;
  }

  empty.style.display = 'none';
  document.getElementById('progressTxt').textContent = `${idx+1} / ${deck.length}`;
  document.getElementById('progFill').style.width = `${((idx+1)/deck.length)*100}%`;

  const w = deck[idx];

  fillWrap.style.display = 'none';
  if (exercise === 'fill') {
    cardWrap.style.display = 'none';
    choicesWrap.style.display = 'none';
    typeWrap.style.display = 'none';
    fillWrap.style.display = 'block';
    renderFill();
    return;
  }
  if (exercise === 'flashcard') {
    cardWrap.style.display = 'block';
    choicesWrap.style.display = 'none';
    typeWrap.style.display = 'none';
    flipped = false;
    document.getElementById('cardInner').classList.remove('flipped');
    document.getElementById('cardFront').textContent = w.r;
    document.getElementById('cardBack').textContent = w.e;
    const tag = `Class ${w.c}`;
    document.getElementById('cardClass').textContent = tag;
    document.getElementById('cardClassBack').textContent = tag;
  } else if (exercise === 'choice') {
    cardWrap.style.display = 'none';
    typeWrap.style.display = 'none';
    choicesWrap.style.display = 'grid';
    choiceAnswered = false;
    renderChoices(w);
  } else {
    cardWrap.style.display = 'none';
    choicesWrap.style.display = 'none';
    typeWrap.style.display = 'flex';
    typeAnswered = false;
    document.getElementById('typeQuestion').textContent = w.r;
    const inp = document.getElementById('typeInput');
    inp.value = '';
    inp.className = 'type-input';
    inp.disabled = false;
    inp.focus();
  }
}

// ── Match Game ──────────────────────────────────────
let matchPairs = [];
let matchSelected = null; // {side:'ru'|'en', idx}
let matchMatched = new Set();
let matchOffset = 0;

function renderMatch() {
  const matchWrap = document.getElementById('matchWrap');
  const cardWrap = document.getElementById('cardWrap');
  const choicesWrap = document.getElementById('choicesWrap');
  const typeWrap = document.getElementById('typeWrap');
  const fillWrap = document.getElementById('fillWrap');
  const empty = document.getElementById('emptyMsg');

  cardWrap.style.display = 'none';
  choicesWrap.style.display = 'none';
  typeWrap.style.display = 'none';
  fillWrap.style.display = 'none';
  empty.style.display = 'none';
  document.getElementById('feedback').textContent = '';

  if (deck.length === 0) {
    empty.style.display = 'block';
    matchWrap.style.display = 'none';
    return;
  }

  // Pick 6 from current offset, cycle through deck to avoid repeating
  const available = deck.length;
  matchPairs = [];
  for (let i = 0; i < 6 && i < available; i++) {
    matchPairs.push(deck[(matchOffset + i) % available]);
  }
  matchOffset = (matchOffset + 6) % available;
  matchSelected = null;
  matchMatched = new Set();

  matchWrap.style.display = 'block';
  document.getElementById('matchScore').textContent = `Match all 6 pairs`;
  document.getElementById('progFill').style.width = '0%';
  document.getElementById('progressTxt').textContent = `0 / 6`;

  const ruShuffled = shuffle([...matchPairs]);
  const enShuffled = shuffle([...matchPairs]);

  const cols = document.getElementById('matchCols');
  cols.innerHTML = '';

  const ruCol = document.createElement('div');
  ruCol.style.cssText = 'display:flex;flex-direction:column;gap:10px;';
  const enCol = document.createElement('div');
  enCol.style.cssText = 'display:flex;flex-direction:column;gap:10px;';

  ruShuffled.forEach((w, i) => {
    const btn = document.createElement('button');
    btn.className = 'match-btn';
    btn.textContent = w.r;
    btn.dataset.word = w.r;
    btn.dataset.side = 'ru';
    btn.dataset.i = i;
    btn.onclick = () => matchClick(btn, 'ru', w.r);
    ruCol.appendChild(btn);
  });

  enShuffled.forEach((w, i) => {
    const btn = document.createElement('button');
    btn.className = 'match-btn';
    btn.textContent = w.e;
    btn.dataset.word = w.r; // store Russian as key
    btn.dataset.side = 'en';
    btn.dataset.i = i;
    btn.onclick = () => matchClick(btn, 'en', w.r);
    enCol.appendChild(btn);
  });

  cols.appendChild(ruCol);
  cols.appendChild(enCol);
}

function matchClick(btn, side, wordKey) {
  if (btn.classList.contains('matched')) return;
  if (btn.classList.contains('selected')) {
    // deselect
    btn.classList.remove('selected');
    matchSelected = null;
    return;
  }

  if (!matchSelected) {
    // First selection
    btn.classList.add('selected');
    matchSelected = { side, wordKey, btn };
    return;
  }

  // Second selection
  if (matchSelected.side === side) {
    // Same column - switch selection
    matchSelected.btn.classList.remove('selected');
    btn.classList.add('selected');
    matchSelected = { side, wordKey, btn };
    return;
  }

  // Different columns - check match
  const isMatch = matchSelected.wordKey === wordKey;
  if (isMatch) {
    btn.classList.add('matched');
    matchSelected.btn.classList.add('matched');
    btn.disabled = true;
    matchSelected.btn.disabled = true;
    matchMatched.add(wordKey);
    matchSelected = null;
    // Record correct for both words in the pair
    recordCorrect(wordKey);
    buildClassChips();
    const done = matchMatched.size;
    document.getElementById('matchScore').textContent = `${done} / 6 matched`;
    document.getElementById('progressTxt').textContent = `${done} / 6`;
    document.getElementById('progFill').style.width = `${(done/6)*100}%`;
    if (done === matchPairs.length) {
      setFeedback('🎉 All matched! Tap Next for more →', true);
    }
  } else {
    // Wrong - flash both red briefly
    btn.classList.add('wrong-flash');
    matchSelected.btn.classList.add('wrong-flash');
    const prevBtn = matchSelected.btn;
    matchSelected = null;
    setTimeout(() => {
      btn.classList.remove('wrong-flash', 'selected');
      prevBtn.classList.remove('wrong-flash', 'selected');
    }, 500);
  }
}

function flipCard() {
  if (exercise !== 'flashcard') return;
  flipped = !flipped;
  document.getElementById('cardInner').classList.toggle('flipped', flipped);
}

function renderChoices(w) {
  const wrap = document.getElementById('choicesWrap');
  wrap.innerHTML = `<div style="grid-column:1/-1;text-align:center;font-family:'Inter',sans-serif;font-size:1.7rem;color:var(--text);margin-bottom:6px;">${w.r}</div>
  <div style="grid-column:1/-1;text-align:center;font-size:0.75rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;">Class ${w.c}</div>`;

  const distractors = ALL_WORDS.filter(x => x.r !== w.r);
  const picked = shuffle(distractors).slice(0,3);
  const options = shuffle([w, ...picked]);

  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = opt.e;
    btn.onclick = () => {
      if (choiceAnswered) return;
      const correct = opt.r === w.r;
      if (correct) {
        choiceAnswered = true;
        btn.classList.add('correct');
        wrap.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
        recordCorrect(w.r);
        buildClassChips();
        setFeedback('✓ Correct!', true);
      } else {
        // Just flash red, disable this option, keep others available
        btn.classList.add('wrong');
        btn.disabled = true;
        setTimeout(() => { btn.classList.remove('wrong'); btn.style.opacity='0.35'; }, 500);
      }
    };
    wrap.appendChild(btn);
  });
}

function checkType() {
  if (typeAnswered) { nextCard(); return; }
  const w = deck[idx];
  const val = document.getElementById('typeInput').value.trim().toLowerCase();
  const correct = w.e.toLowerCase();
  const inp = document.getElementById('typeInput');
  const answerWords = correct.split(/[\s\/,()]+/).filter(Boolean);
  const ok = answerWords.some(aw => val.includes(aw)) || correct.includes(val) && val.length > 1;
  typeAnswered = true;
  if (ok) {
    inp.className = 'type-input correct';
    recordCorrect(w.r);
    buildClassChips();
    setFeedback('✓ Correct! — ' + w.e, true);
  } else {
    inp.className = 'type-input wrong';
    setFeedback('✗ ' + w.e, false);
  }
  inp.disabled = true;
  document.querySelector('.submit-btn').textContent = 'Next →';
}

function setFeedback(msg, good) {
  const fb = document.getElementById('feedback');
  fb.textContent = msg;
  fb.className = 'feedback ' + (good ? 'good' : 'bad');
}

function nextCard() {
  if (deck.length === 0) return;
  if (exercise === 'match') { renderMatch(); return; }
  if (exercise === 'fill') { renderFill(); return; }
  if (exercise === 'typein' && !typeAnswered) { checkType(); return; }
  // For flashcard: if card was flipped, count as a correct review
  if (exercise === 'flashcard' && flipped) {
    recordCorrect(deck[idx].r);
    buildClassChips();
  }
  idx = (idx + 1) % deck.length;
  document.getElementById('feedback').textContent = '';
  document.querySelector('.submit-btn').textContent = 'Check →';
  renderCurrent();
}

function prevCard() {
  if (deck.length === 0) return;
  if (exercise === 'match') return;
  idx = (idx - 1 + deck.length) % deck.length;
  document.getElementById('feedback').textContent = '';
  document.querySelector('.submit-btn').textContent = 'Check →';
  renderCurrent();
}

function updateScore() {}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextCard(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevCard(); }
  if (e.key === 'Enter' && exercise === 'flashcard') flipCard();
});

document.getElementById('typeInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkType();
});

// Boot
loadProgress();
buildClassChips();
document.getElementById('classSelector').style.display = 'flex';
buildDeck();
</script>
</body>
